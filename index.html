<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verde</title>
    <script>
      // Early Critical Diagnostic
      window.onerror = function(msg, url, line, col, error) {
        alert("CRITICAL ERROR: " + msg + "\nAt: " + url + ":" + line + ":" + col);
        return false;
      };
      window.onunhandledrejection = function(event) {
        alert("UNHANDLED REJECTION: " + event.reason);
      };
      console.log("Diagnostic attached to Head.");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="html-marker" style="position:fixed; top:0; left:0; background:red; color:white; font-size:14px; padding:5px; z-index:9999; font-weight:bold;">
      VERDE HTML LOADED
    </div>
    <div id="root" style="display:block !important; min-height:100vh; background:white;">
      <div style="padding:100px 20px; text-align:center; font-family:sans-serif;">
        <h1 style="color:red; font-size:30px;">IF YOU SEE THIS, HTML IS WORKING</h1>
        <p style="font-size:18px; color:black;">Waiting for JavaScript to start...</p>
        <div style="width:40px; height:40px; border:4px solid #00A15E; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; margin:20px auto;"></div>
      </div>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script>alert("HTML BODY REACHED");</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
